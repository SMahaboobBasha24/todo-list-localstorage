<!DOCTYPE html>
<html>
<head>
<title>Todo List</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#1e293b;
padding:30px;
border-radius:10px;
width:350px;
}

h2{
text-align:center;
}

input{
width:75%;
padding:10px;
border:none;
border-radius:6px;
}

button{
padding:10px;
border:none;
background:#22c55e;
color:white;
border-radius:6px;
cursor:pointer;
}

ul{
list-style:none;
padding:0;
margin-top:20px;
}

li{
background:#334155;
padding:10px;
margin-top:8px;
border-radius:6px;
display:flex;
justify-content:space-between;
}

.delete{
background:#ef4444;
padding:5px 10px;
border-radius:4px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>✅ Todo List</h2>

<input id="taskInput" placeholder="Add a task">

<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || []

function displayTasks(){

let list = document.getElementById("taskList")
list.innerHTML=""

tasks.forEach((task,index)=>{

let li=document.createElement("li")

li.innerHTML =
task +
'<span class="delete" onclick="deleteTask('+index+')">X</span>'

list.appendChild(li)

})

localStorage.setItem("tasks",JSON.stringify(tasks))

}

function addTask(){

let input=document.getElementById("taskInput")

if(input.value.trim()=="") return

tasks.push(input.value)

input.value=""

displayTasks()

}

function deleteTask(index){

tasks.splice(index,1)

displayTasks()

}

displayTasks()

</script>

</body>
</html>
